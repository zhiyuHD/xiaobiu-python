name: Publish to PyPI

on:
  push:
    branches: [ "main"]  # 当 push 到 main/master 分支时触发

permissions:
  contents: read
  id-token: write  # 用于 Trusted Publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi  # 环境名称，需要在 GitHub 仓库设置中配置
      url: https://pypi.org/project/python-xiaobiu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1